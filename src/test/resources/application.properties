# Test profile — uses H2 in-memory so the suite doesn't require a running Postgres.
# PostgreSQL mode keeps SQL dialect close to production for the parts H2 supports.
spring.datasource.url=jdbc:h2:mem:velocell_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Avoid binding a real port during context tests.
grpc.server.port=-1
